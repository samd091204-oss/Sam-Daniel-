<!DOCTYPE html>
<html>
<head>
    <title>Review</title>
</head>

<body>

<h2>Submit Review</h2>

<form action="/submit_review" method="POST">
    <input type="hidden" name="order_id" value="{{ order_id }}">

    <textarea name="review" required></textarea><br><br>

    <select name="rating">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
